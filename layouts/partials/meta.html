{{ $siteTitle := .Site.Title }}
{{ if and (not .IsHome) (eq .Language.Lang "en") }}
  {{ $siteTitle = "XF-Trans — Professional Translation & Language Services" }}
{{ end }}
<title itemprop="name">{{if .IsHome}}{{ $siteTitle }}{{else}}{{ .Title }} | {{ $siteTitle }}{{end}}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta property="og:title" content="{{ .Title }} | {{ $siteTitle }}" />
<meta name="twitter:title" content="{{ .Title }} | {{ $siteTitle }}" />
<meta itemprop="name" content="{{ .Title }} | {{ $siteTitle }}" />
<meta name="application-name" content="{{ .Title }} | {{ $siteTitle }}" />
<meta property="og:description"
      content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
<meta property="og:site_name" content="{{ $siteTitle }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:locale" content="{{ if eq .Language.Lang "en" }}en_US{{ else }}zh_CN{{ end }}">
<meta property="og:image" content="{{ .Site.Params.og_image | absURL }}" />
<meta property="og:image:secure_url" content="{{ .Site.Params.og_image | absURL }}" />
<meta property="og:image:width" content="256" />
<meta property="og:image:height" content="256" />
<meta property="og:type" content="{{if .IsHome}}website{{else}}article{{end}}" />
<meta name="twitter:card" content="summary" />
