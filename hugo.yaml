languages:
  zh:
    languageCode: zh-cn
    languageName: 中文
    weight: 1
    title: 显福翻译-专业翻译提供商
    params:
      author: 显福翻译
      authorimage: ../assets/images/global/author.webp
      og_image: /images/logo.webp
      moto: "让专业内容，准确进入国际语境"
      description: "显福翻译长期为政府、企业与专业机构提供笔译、口译、本地化与语言支持服务，总共支持项目3000+，服务客户500+，我们拥有专业的翻译与管理团队，致力于帮助官网内容、项目文件与国际沟通表达更准确、更专业。"
      disable_theme_toggle: true
      newsletter_signup: false
      hero:
        button_primary:
          text: "查看服务内容"
          url: "/#service-overview"
        button_secondary:
          text: "直接联系我们"
          url: "/contact/"
      p8:
        heading: "重点解读——快捷入口"
        content:
          - text: "内容太多？直接按需求进入最相关的入口。"
        paths:
          - title: "显福翻译适不适合我"
            text: "想先判断显福翻译的工作方式、合作逻辑和适合服务的客户类型。"
            button: "进入关于我们"
            url: "/about/"
          - title: "显福翻译能做什么"
            text: "想快速看笔译、口译、本地化与长期支持分别对应哪些场景。"
            button: "返回首页中段"
            url: "/#service-overview"
          - title: "我有翻译需求"
            text: "我手上已有材料、会议、接待或项目，想直接开始沟通。"
            button: "直接联系"
            url: "https://wj.qq.com/s2/27020606/8eec/"
          - title: "想先了解合作方式"
            text: "我更关心显福翻译为什么这样做、怎么判断需求、合作是否稳定。"
            button: "查看关于我们"
            url: "/about/"
      p1:
        heading: "语言服务，不该只停留在准确翻译"
        content:
          - text: "很多跨语言沟通的问题，并不出在单个词句是否翻对，而是出在整体表达是否专业、是否符合行业语境、是否足以让对方快速理解并建立信任。"
          - text: "显福翻译关注的不只是语言转换本身，更关注一份内容在真实使用场景中的沟通效果，让官网、资料、项目文件和现场沟通都更可用、更可信。"
          - text: '我们希望客户拿到的不只是"翻完了"的文本，而是能够直接拿去发、拿去讲、拿去谈的专业表达。'
      p2:
        heading: "覆盖关键场景的各大语言服务"
        content:
          - text: "从对外展示到项目推进，从正式文件到现场沟通，我们围绕客户真实使用场景提供更稳妥的语言支持。"
          - text: "服务范围包括笔译、口译、本地化与语言支持，既能处理单次交付，也适合长期有官网、资料、接待和国际业务沟通需求的客户。"
        services:
          - title: "笔译服务"
            label: "正式文稿"
            text: "适用于合同协议、公司介绍、宣传资料、官网内容、招投标材料、项目文件、报告及各类专业文档。"
            points:
              - "适合合同、报告、公司介绍、官网文案等正式文本。"
              - "重点关注术语统一、逻辑清楚和表达分寸。"
              - "让译文可直接进入提交、发布和业务沟通场景。"
          - title: "口译服务"
            label: "现场沟通"
            text: "适用于商务会谈、客户接待、会议交流、培训沟通、展会洽谈等场景，支持陪同口译、交替传译、同声传译及相关现场支持。"
            points:
              - "适合会谈、接待、会议、培训、展会等即时交流场景。"
              - "接受培训的专业译员提供口译支持，高端译员提供同声传译。"
              - "提供专业同传支持、设备租赁和现场安排的全套服务支持。"
          - title: "本地化服务"
            label: "对外表达"
            text: "适用于官网、产品页面、品牌资料和海外市场传播内容，兼顾语言转换、阅读习惯与目标市场接受度。"
            points:
              - "适合官网、品牌页、产品介绍和海外传播材料。"
              - "不仅翻文字，也看表达逻辑、阅读节奏和目标市场接受度。"
              - "让内容更像真实对外表达，而不是直译版本。"
          - title: "语言支持"
            label: "长期协作"
            text: "适用于长期有对外材料需求、希望统一术语并提升表达专业度的客户。"
            points:
              - "适合长期有多语言资料和国际沟通需求的团队。"
              - "可持续梳理术语、统一表达、减少返工。"
              - "更适合建立稳定合作节奏，而非临时一次性处理。"
      p3:
        heading: "比完成翻译更重要的是，让内容真正可用"
        content:
          - text: "很多客户真正担心的，不是有没有人能翻，而是翻完之后能不能放心拿去发、拿去讲、拿去谈。显福翻译更看重最终使用效果，而不是只完成字面转换。"
        cards:
          - title: "理解专业场景"
            text: "政府材料、企业介绍、技术资料和商务沟通，并不能用同一种语言处理方式。"
          - title: "重视交付稳定"
            text: "关注术语统一、前后表达一致和交付节奏清晰，减少反复修改带来的时间损耗。"
          - title: "兼顾准确与表达"
            text: "准确只是基础，高质量的语言服务还要兼顾专业感、可读性和沟通效率。"
          - title: "适合长期合作"
            text: "针对长期有官网、资料、接待和项目沟通需求的客户，更容易形成稳定高效的配合。"
      p4:
        heading: "如何开始合作？"
        content:
          - text: ""
        sections:
          - title: "关于我们"
            text: "看我们的工作方式、适合服务的客户类型，以及长期合作逻辑。"
            url: "/about/"
          - title: "联系我们"
            text: "已经有材料或明确需求时，直接进入沟通。"
            url: "https://wj.qq.com/s2/27020606/8eec/"
          - title: "支持方向"
            text: "查看首页整合笔译、口译、本地化与长期支持的核心说明。"
            url: "/#service-overview"
          - title: "获取报价"
            text: "如果您有清楚的需求，快速联系我们，我们给您发送报价。"
            url: "https://wj.qq.com/s2/27020606/8eec/"
        article_link:
          text: "查看补充文章"
          url: "/posts/"
      p5:
        heading: "先提供试译文件"
        content:
          - text: "如果你正在准备官网、公司介绍、宣传资料、项目文件，或者正在安排会议、接待、展会和培训等语言支持需求，可以先把当前材料或需求发来。我们会从内容性质、使用场景和沟通目标出发，帮你判断更适合怎样的语言处理方式。"
        buttons:
          - text: "获取报价"
            url: "mailto:contact@xf-trans.com"
          - text: "了解合作方式"
            url: "/about/"
      p6:
        heading: "适合这些正在提升国际沟通质量的客户"
        content:
          - text: "如果你正在处理对外展示、跨语言协作或国际业务沟通，这些服务会更适合你。"
        clients:
          - title: "政府与公共机构"
            text: "适合对外交流、接待、宣传与正式资料场景。"
          - title: "制造业与外贸企业"
            text: "适合官网、产品资料、客户沟通与出海内容场景。"
          - title: "医疗、科技、工程等专业行业"
            text: "适合对准确性和行业理解要求较高的内容。"
          - title: "有展会、会议、接待需求的组织"
            text: "适合需要口译与现场双语支持的场景。"
      p7:
        heading: "描述需求"
        content:
          - text: "无论是官网内容、宣传资料、项目文件，还是会议、接待、展会等口译需求，前期判断是否准确，往往决定后续推进是否顺畅。"
        steps:
          - title: "说明需求"
            text: "告诉我们材料类型、使用场景和时间要求。"
          - title: "判断方案"
            text: "明确适合笔译、口译、本地化还是组合支持。"
          - title: "推进交付"
            text: "按内容性质组织翻译、审校或口译安排。"
          - title: "完成使用"
            text: "让材料或现场沟通真正进入可直接使用状态。"
      faq:
        heading: "客户常见问题"
        content:
          - text: "很多客户第一次接触时，关心的不是术语，而是先判断能不能做、怎么开始、需不需要准备很多东西。"
        items:
          - question: "我现在只有一小段内容，能不能先试译？"
            answer: "可以。很多项目一开始并不是完整材料，而是一段文案、一个页面链接或一份样稿。先发过来，我们判断方向和适合的支持方式。"
          - question: "官网英文内容已经有了，但读起来不自然，还能处理吗？"
            answer: "可以。这类情况通常不是重做全部内容，而是先判断哪些页面需要改写、哪些术语需要统一、哪些表达需要更符合对外沟通语境。"
          - question: "会议、接待、培训这些现场需求也能做吗？"
            answer: "可以。首页已将口译、同传和相关现场支持单独整理，方便客户快速判断是否适合自身场景。"
          - question: "你们能提供哪些语种的翻译服务？"
            answer: "显福翻译有着专业的翻译团队，包括英语、法语、日语、西班牙语、俄语、葡萄牙语等常见语种的笔译与口译，还有波兰语、捷克语、塞尔维亚语、土耳其语、匈牙利语等小众语种的笔译和口译，覆盖语种广泛，服务样式齐全。"
      contact:
        channels:
          - title: "电子邮箱"
            type: "email"
            value: "contact@xf-trans.com"
          - title: "微信"
            type: "text"
            value: "Shinefooo"
            qrcode: "/images/wechat-qr.webp"
          - title: "微信公众号"
            type: "qrcode"
            value: "显福翻译"
            qrcode: "/images/wechat-official-qr.webp"
          - title: "小红书"
            type: "url"
            value: "显福翻译"
            url: "https://xhslink.com/m/1UpuomCuR8h"
