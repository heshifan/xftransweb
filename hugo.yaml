  en:
    languageCode: en
    languageName: English
    weight: 2
    title: "XF-Trans — Professional Translation & Language Services"
    params:
      author: XF-Trans
      authorimage: ../assets/images/global/author.webp
      og_image: /images/logo.webp
      moto: "Precision in Every Word"
      description: "XF-Trans provides professional translation, interpretation, localization, and language support services for government agencies, enterprises, and professional institutions — trusted by 500+ clients across 3000+ projects."
      disable_theme_toggle: true
      newsletter_signup: false
      hero:
        button_primary:
          text: "View Our Services"
          url: "/en/#service-overview"
        button_secondary:
          text: "Contact Us"
          url: "/en/contact/"
      p8:
        heading: "Quick Access"
        content:
          - text: "Too much information? Jump straight to what you need."
        paths:
          - title: "Is XF-Trans Right for Me?"
            text: "Understand how we work, who we serve, and what our long-term collaboration looks like."
            button: "About Us"
            url: "/en/about/"
          - title: "What We Do"
            text: "See translation, interpretation, localization, and ongoing language support at a glance."
            button: "Service Overview"
            url: "/en/#service-overview"
          - title: "I Have a Project"
            text: "Already have materials, meetings, or a project? Let's talk."
            button: "Get Started"
            url: "/en/contact/"
          - title: "How We Partner"
            text: "Our approach, process, and why long-term collaboration works better."
            button: "Learn More"
            url: "/en/about/"
      p1:
        heading: "Language Services That Go Beyond Accuracy"
        content:
          - text: "Most cross-language challenges aren't about whether individual words are correct — they're about whether the overall expression is professional, context-appropriate, and trustworthy to the reader."
          - text: "At XF-Trans, we focus not just on language conversion, but on how content performs in real-world use — making websites, documents, project files, and onsite communications more usable and credible."
          - text: "We want our clients to receive more than just a 'translated' file — they should get professional content ready to publish, present, and negotiate with."
      p2:
        heading: "Services Across Every Key Scenario"
        content:
          - text: "From external communications to project execution, from formal documents to onsite meetings — we provide reliable language support tailored to real use cases."
          - text: "Our services cover translation, interpretation, localization, and language support — handling single assignments and long-term retainers alike."
        services:
          - title: "Translation"
            label: "Formal Documents"
            text: "Contracts, company profiles, marketing materials, website content, bid documents, project reports, and professional documentation."
            points:
              - "Suitable for contracts, reports, company profiles, and website copy."
              - "Terminology consistency, clear logic, and appropriate tone."
              - "Deliverables ready for submission, publication, and business communication."
          - title: "Interpretation"
            label: "Onsite Communication"
            text: "Business meetings, client reception, conferences, training sessions, trade shows — supported by escort, consecutive, and simultaneous interpretation."
            points:
              - "Ideal for meetings, receptions, conferences, training, and exhibitions."
              - "Professional interpreters for general needs; senior interpreters for simultaneous interpretation."
              - "Full equipment rental and onsite coordination for simultaneous interpretation."
          - title: "Localization"
            label: "Global Content"
            text: "Websites, product pages, brand materials, and overseas marketing content — balancing language accuracy with local reading habits and market expectations."
            points:
              - "For websites, brand pages, product intros, and overseas communication assets."
              - "Beyond word-for-word translation — we adapt logic, flow, and cultural resonance."
              - "Content reads like authentic global communication, not a literal translation."
          - title: "Language Support"
            label: "Long-Term Retainers"
            text: "Ongoing support for clients with regular multilingual needs, consistent terminology, and improving expression quality over time."
            points:
              - "For teams with ongoing multilingual materials and international communications."
              - "Consistent terminology, unified expression, minimized rework."
              - "Best suited for stable collaboration rather than one-off assignments."
      p3:
        heading: "More Than Translation — Content You Can Actually Use"
        content:
          - text: "What many clients truly worry about isn't finding someone to translate — it's whether the result will be reliable enough to publish, present, or negotiate with. At XF-Trans, we prioritize real-world usability over literal conversion."
        cards:
          - title: "Understand the Context"
            text: "Government materials, corporate profiles, technical documents, and business communications each require a different approach."
          - title: "Consistent Delivery"
            text: "Terminology consistency, unified expression, and clear delivery timelines minimize costly back-and-forth revisions."
          - title: "Accuracy + Readability"
            text: "Accuracy is just the foundation. Quality language services must also achieve professionalism, readability, and communication effectiveness."
          - title: "Built for Collaboration"
            text: "For clients with ongoing website, documentation, and international communication needs, consistent collaboration yields the best results."
      p4:
        heading: "How to Get Started?"
        content:
          - text: ""
        sections:
          - title: "About Us"
            text: "Learn how we work, who we serve, and the logic behind long-term collaboration."
            url: "/en/about/"
          - title: "Contact Us"
            text: "If you have materials or a clear need, reach out directly."
            url: "/en/contact/"
          - title: "Service Overview"
            text: "See translation, interpretation, localization, and ongoing support on one page."
            url: "/en/#service-overview"
          - title: "Get a Quote"
            text: "If your requirements are clear, contact us and we'll send you a quote promptly."
            url: "/en/contact/"
        article_link:
          text: "Read Supplementary Articles"
          url: "/en/posts/"
      p5:
        heading: "Send Us a Sample or Brief"
        content:
          - text: "If you're preparing website content, company profiles, marketing materials, project documents, or arranging meetings, exhibitions, or training that need language support — send us your current materials or requirements. We'll assess the nature, use case, and communication goals to determine the best approach."
        buttons:
          - text: "Get a Quote"
            url: "mailto:contact@xf-trans.com"
          - text: "How We Work"
            url: "/en/about/"
      p6:
        heading: "Who We Serve"
        content:
          - text: "If you're managing cross-language communications, international collaboration, or global business outreach — our services are designed for you."
        clients:
          - title: "Government & Public Institutions"
            text: "Official communications, reception, publicity, and formal documentation."
          - title: "Manufacturing & Trading Companies"
            text: "Websites, product materials, customer communications, and export content."
          - title: "Healthcare, Tech & Engineering"
            text: "Content that demands high accuracy and industry-specific understanding."
          - title: "Organizations with Events & Meetings"
            text: "Interpretation and bilingual onsite support for exhibitions, conferences, and receptions."
      p7:
        heading: "How We Work"
        content:
          - text: "Whether it's website content, marketing materials, project documents, or interpretation needs for meetings and events — accurate upfront assessment determines how smoothly things proceed."
        steps:
          - title: "Tell Us Your Needs"
            text: "Describe your material type, usage scenario, and timeline."
          - title: "We Assess the Approach"
            text: "We determine whether translation, interpretation, localization, or a combination is most suitable."
          - title: "Execution & Delivery"
            text: "We organize translation, review, or interpretation based on content type."
          - title: "Ready to Use"
            text: "Your materials or onsite communication are delivered in a fully usable state."
      faq:
        heading: "Frequently Asked Questions"
        content:
          - text: "When clients first reach out, they often want to know: can you handle this, how do we start, and what do we need to prepare?"
        items:
          - question: "I only have a short text — can I request a trial translation?"
            answer: "Yes. Many projects start with just a piece of copy, a page link, or a sample draft. Send it over, and we'll assess the best approach and support method."
          - question: "My website already has English content but it doesn't read naturally — can you help?"
            answer: "Absolutely. Typically this doesn't mean rewriting everything — we identify which pages need revision, which terms need standardization, and which expressions need to better suit English communication context."
          - question: "Do you handle onsite needs like meetings, receptions, and training?"
            answer: "Yes. We provide escort interpretation, consecutive interpretation, and simultaneous interpretation with full equipment and onsite support."
          - question: "What languages do you cover?"
            answer: "XF-Trans has a professional team covering English, French, Japanese, Spanish, Russian, Portuguese, and other common languages, as well as Polish, Czech, Serbian, Turkish, Hungarian, and other less common languages — for both translation and interpretation."
      contact:
